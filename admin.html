<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel | NOAH Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Outfit', sans-serif;
        background: #0b0f19;
        color: #e0e6f0;
        min-height: 100vh;
      }
      .admin-header {
        background: rgba(11,15,25,0.95);
        border-bottom: 1px solid rgba(139,92,246,0.3);
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .admin-header h1 { font-size: 1.4rem; }
      .admin-header h1 span { color: #8b5cf6; }
      .admin-badge {
        background: rgba(139,92,246,0.2);
        color: #a78bfa;
        border: 1px solid rgba(139,92,246,0.4);
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .admin-container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 12px;
        padding: 1.25rem;
        text-align: center;
      }
      .stat-card .stat-value {
        font-size: 2rem;
        font-weight: 800;
        line-height: 1;
        margin-bottom: 0.25rem;
      }
      .stat-card .stat-label { font-size: 0.8rem; color: #94a3b8; }
      .stat-card.revenue .stat-value { color: #4ade80; }
      .stat-card.pending .stat-value { color: #facc15; }
      .stat-card.processing .stat-value { color: #60a5fa; }
      .stat-card.completed .stat-value { color: #4ade80; }
      .stat-card.rejected .stat-value { color: #f87171; }

      .panel-controls {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .filter-select {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        color: #e0e6f0;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
      }
      .btn-refresh {
        background: rgba(139,92,246,0.2);
        border: 1px solid rgba(139,92,246,0.4);
        color: #a78bfa;
        padding: 0.5rem 1.2rem;
        border-radius: 8px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-refresh:hover { background: rgba(139,92,246,0.35); }
      .total-count { color: #94a3b8; font-size: 0.9rem; margin-left: auto; }

      .orders-table-wrap {
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 14px;
        overflow: hidden;
        overflow-x: auto;
      }
      table { width: 100%; border-collapse: collapse; min-width: 800px; }
      thead th {
        background: rgba(139,92,246,0.1);
        padding: 0.9rem 1rem;
        text-align: left;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      tbody tr {
        border-bottom: 1px solid rgba(255,255,255,0.05);
        transition: background 0.15s;
      }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: rgba(255,255,255,0.04); }
      tbody td {
        padding: 0.85rem 1rem;
        font-size: 0.88rem;
        vertical-align: middle;
      }
      .order-id-cell { font-family: monospace; color: #a78bfa; font-weight: 600; }
      .badge {
        display: inline-block;
        padding: 0.2rem 0.65rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: capitalize;
      }
      .badge-pending { background: rgba(250,204,21,0.15); color: #facc15; border: 1px solid rgba(250,204,21,0.3); }
      .badge-processing { background: rgba(96,165,250,0.15); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
      .badge-completed { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
      .badge-rejected { background: rgba(248,113,113,0.15); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }

      .status-select {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.12);
        color: #e0e6f0;
        padding: 0.3rem 0.5rem;
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.82rem;
        cursor: pointer;
      }
      .btn-save {
        background: rgba(139,92,246,0.2);
        border: 1px solid rgba(139,92,246,0.4);
        color: #a78bfa;
        padding: 0.3rem 0.75rem;
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.82rem;
        cursor: pointer;
        transition: background 0.2s;
      }
      .btn-save:hover { background: rgba(139,92,246,0.35); }
      .notes-input {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.1);
        color: #e0e6f0;
        padding: 0.3rem 0.5rem;
        border-radius: 6px;
        font-family: 'Outfit', sans-serif;
        font-size: 0.82rem;
        width: 120px;
      }
      .empty-state {
        text-align: center;
        padding: 3rem;
        color: #94a3b8;
      }
      .loading { text-align: center; padding: 3rem; color: #94a3b8; }
      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: rgba(74,222,128,0.15);
        border: 1px solid rgba(74,222,128,0.4);
        color: #4ade80;
        padding: 0.75rem 1.25rem;
        border-radius: 10px;
        font-size: 0.9rem;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.3s;
        z-index: 999;
        pointer-events: none;
      }
      .toast.error { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.4); color: #f87171; }
      .toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body>
    <header class="admin-header">
      <h1>NOAH<span>Store</span></h1>
      <span class="admin-badge">Admin Panel</span>
    </header>

    <div class="admin-container">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card revenue"><div class="stat-value" id="statRevenue">-</div><div class="stat-label">Revenue (USD)</div></div>
        <div class="stat-card"><div class="stat-value" id="statTotal">-</div><div class="stat-label">Total Orders</div></div>
        <div class="stat-card pending"><div class="stat-value" id="statPending">-</div><div class="stat-label">Pending</div></div>
        <div class="stat-card processing"><div class="stat-value" id="statProcessing">-</div><div class="stat-label">Processing</div></div>
        <div class="stat-card completed"><div class="stat-value" id="statCompleted">-</div><div class="stat-label">Completed</div></div>
        <div class="stat-card rejected"><div class="stat-value" id="statRejected">-</div><div class="stat-label">Rejected</div></div>
      </div>

      <div class="panel-controls">
        <select class="filter-select" id="filterStatus">
          <option value="">All Orders</option>
          <option value="pending">Pending</option>
          <option value="processing">Processing</option>
          <option value="completed">Completed</option>
          <option value="rejected">Rejected</option>
        </select>
        <button class="btn-refresh" id="btnRefresh">↻ Refresh</button>
        <span class="total-count" id="totalCount"></span>
      </div>

      <div class="orders-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Game</th>
              <th>Account</th>
              <th>Package</th>
              <th>Price</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Date</th>
              <th>Notes</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="10" class="loading">Loading orders...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      let adminCreds = null;

      function getCredentials() {
        if (adminCreds) return adminCreds;
        const password = prompt("Enter admin password:");
        if (!password) { window.location.href = "/"; return null; }
        adminCreds = "Basic " + btoa("admin:" + password);
        return adminCreds;
      }

      function showToast(msg, isError = false) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast" + (isError ? " error" : "") + " show";
        setTimeout(() => t.className = "toast", 3000);
      }

      async function fetchStats() {
        const creds = getCredentials();
        if (!creds) return;
        try {
          const res = await fetch("/api/admin/stats", { headers: { Authorization: creds } });
          if (res.status === 401) { adminCreds = null; showToast("Incorrect password", true); return; }
          const data = await res.json();
          document.getElementById("statRevenue").textContent = "$" + parseFloat(data.revenue).toFixed(2);
          document.getElementById("statTotal").textContent = data.total;
          document.getElementById("statPending").textContent = data.pending;
          document.getElementById("statProcessing").textContent = data.processing;
          document.getElementById("statCompleted").textContent = data.completed;
          document.getElementById("statRejected").textContent = data.rejected;
        } catch (e) { showToast("Failed to load stats", true); }
      }

      async function fetchOrders() {
        const creds = getCredentials();
        if (!creds) return;
        const status = document.getElementById("filterStatus").value;
        const url = "/api/admin/orders" + (status ? "?status=" + status : "");
        const tbody = document.getElementById("ordersBody");
        tbody.innerHTML = '<tr><td colspan="10" class="loading">Loading...</td></tr>';
        try {
          const res = await fetch(url, { headers: { Authorization: creds } });
          if (res.status === 401) { adminCreds = null; showToast("Incorrect password", true); return; }
          const data = await res.json();
          document.getElementById("totalCount").textContent = data.total + " order(s) found";
          if (data.orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" class="empty-state">No orders found.</td></tr>';
            return;
          }
          tbody.innerHTML = data.orders.map(o => `
            <tr data-id="${o.id}">
              <td class="order-id-cell">${o.order_id}</td>
              <td>${o.game}</td>
              <td>${o.username ? '<strong>' + escHtml(o.username) + '</strong><br>' : ''}${escHtml(o.user_id)}${o.zone_id ? ' (' + escHtml(o.zone_id) + ')' : ''}</td>
              <td>${escHtml(o.package_name)}</td>
              <td>$${parseFloat(o.price).toFixed(2)}</td>
              <td>${escHtml(o.payment_method)}</td>
              <td><span class="badge badge-${o.status}">${o.status}</span></td>
              <td>${new Date(o.created_at).toLocaleDateString()}<br><small>${new Date(o.created_at).toLocaleTimeString()}</small></td>
              <td><input class="notes-input" data-field="notes" value="${escHtml(o.notes || '')}" placeholder="Add note..." /></td>
              <td>
                <select class="status-select" data-field="status">
                  <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
                  <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
                  <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
                  <option value="rejected" ${o.status==='rejected'?'selected':''}>Rejected</option>
                </select>
                <button class="btn-save" onclick="saveOrder(${o.id}, this.closest('tr'))">Save</button>
              </td>
            </tr>
          `).join("");
        } catch (e) { showToast("Failed to load orders", true); }
      }

      function escHtml(str) {
        if (!str) return "";
        return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
      }

      async function saveOrder(id, row) {
        const creds = getCredentials();
        if (!creds) return;
        const status = row.querySelector('[data-field="status"]').value;
        const notes = row.querySelector('[data-field="notes"]').value;
        try {
          const res = await fetch("/api/admin/orders/" + id + "/status", {
            method: "PATCH",
            headers: { "Content-Type": "application/json", Authorization: creds },
            body: JSON.stringify({ status, notes }),
          });
          if (res.status === 401) { adminCreds = null; showToast("Session expired", true); return; }
          if (res.ok) {
            showToast("Order updated successfully");
            fetchStats();
            fetchOrders();
          } else {
            showToast("Failed to update order", true);
          }
        } catch (e) { showToast("Network error", true); }
      }

      document.getElementById("filterStatus").addEventListener("change", fetchOrders);
      document.getElementById("btnRefresh").addEventListener("click", () => { fetchStats(); fetchOrders(); });

      fetchStats();
      fetchOrders();
    </script>
  </body>
</html>
